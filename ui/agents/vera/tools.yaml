# Vera proves her sovereignty; she never moves funds, so she declares no
# fund-moving tools. Her identity is her own on-chain account, and every Moltbook
# post she makes is signed by her key. That signature is the proof itself, not a
# tool she calls: posting is the platform's signed post_to_moltbook intent, and
# what makes a post hers is that it verifies against her account, which no
# operator can reproduce.

native-tools: []

# No outside information is needed to state what she is and how to check it.
common-tools: []
